<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>SkyNode Monitor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>☁ SkyNode Solutions</h1>
<p>Monitoramento de Hardware em Tempo Real</p>
</header>

<main>

<section class="dashboard">

<div class="card" id="card-cpu">
<h2>CPU</h2>
<p id="cpu">0%</p>
</div>

<div class="card" id="card-ram">
<h2>RAM</h2>
<p id="ram">0 GB</p>
</div>

<div class="card" id="card-temp">
<h2>Temperatura</h2>
<p id="temp">0°C</p>
</div>

</section>

</main>

<footer>
<p>SkyNode Monitor ©</p>
</footer>

<script src="script.js"></script>

</body>
</html>
